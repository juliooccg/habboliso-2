<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabboLiso</title>
<style>
body {font-family: Arial, sans-serif; margin:0; padding:10px; max-width:1200px; margin-left:auto; margin-right:auto; background-color:#f5f5f5;}
h1,h2{text-align:center;}
button{border:none;border-radius:4px;padding:5px 10px;cursor:pointer;background:#007bff;color:white;transition:.2s;}
button:hover{background:#0056b3;}
#search{width:100%; max-width:400px; padding:8px; margin:auto; display:block; border-radius:6px; border:1px solid #ccc;}
.container{display:grid; gap:15px; margin:15px 0;}
.item-card{background:white; padding:10px; border-radius:8px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); position:relative; transition:.2s;}
.item-card:hover{transform:translateY(-3px);}
.item-card img{width:100%; border-radius:6px; cursor:pointer; transition:border .2s;}
.item-card img.selected{border:2px solid blue;}
.favorite-btn{position:absolute; top:5px; right:5px; background:transparent; font-size:20px; cursor:pointer;}
.list-mode .container{display:block;}
.list-mode .item-card{display:flex; align-items:center; gap:15px;}
.list-mode .item-card img{width:80px;}
.list-mode .item-card .btns{flex-direction:column; margin-left:auto;}
#editor-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:10px; margin-bottom:15px;}
#editor-summary{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
#editor-filters{display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:10px;}
#editor-filters button.active{background:#28a745;}
#wishlist-items{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:15px;}
#popular-items{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:15px; margin-top:30px;}
.suggestion-list{position:absolute; background:white; border:1px solid #ccc; width:100%; max-width:400px; z-index:1000; border-radius:4px;}
.suggestion-list div{padding:5px; cursor:pointer;}
.suggestion-list div:hover{background:#f0f0f0;}
@media(max-width:768px){.list-mode .item-card{flex-direction:column;}.list-mode .item-card .btns{flex-direction:row;margin-left:0;gap:5px;}}
</style>
</head>
<body>

<h1>HabboLiso</h1>

<!-- Busca -->
<div style="position:relative;">
<input type="text" id="search" placeholder="Buscar itens...">
<div id="suggestions" class="suggestion-list" style="display:none;"></div>
</div>

<!-- Modo lista/grade -->
<div style="text-align:center; margin:10px 0;">
<button id="gridBtn">Grade</button>
<button id="listBtn">Lista</button>
</div>

<!-- Catálogo -->
<div id="items-container" class="container"></div>

<!-- Itens populares -->
<h2>🔥 Itens Populares</h2>
<div id="popular-items"></div>

<!-- Editor de visuais -->
<section id="editor">
<h2>🎨 Editor de Visuais</h2>
<div id="editor-filters">
<button data-category="Todos" class="active">Todos</button>
<button data-category="Cabelo">Cabelo</button>
<button data-category="Penteados">Penteados</button>
<button data-category="Chapéu">Chapéu</button>
<button data-category="Óculos">Óculos</button>
<button data-category="Camisas">Camisas</button>
<button data-category="Calças">Calças</button>
<button data-category="Sapatos">Sapatos</button>
<button data-category="Acessórios">Acessórios</button>
</div>
<div id="editor-grid"></div>
<div id="editor-summary">
<p>Valor total: R$<span id="total-price">0</span></p>
<button id="buy-all">Comprar todos via WhatsApp</button>
</div>
</section>

<!-- Lista de desejos -->
<section id="wishlist">
<h2>💖 Lista de Desejos</h2>
<div id="wishlist-items"></div>
</section>

<script>
let items=[],favorites=JSON.parse(localStorage.getItem("favorites")||"[]"),selectedItems=[],currentCategory="Todos";
const CREDITS_TO_REAL=0.20,WHATSAPP_PHONE="48991139208";

// WhatsApp
function openWhatsApp(itemName,price){
const message=`Olá! Quero comprar: ${itemName}. Valor: R$${price}`;
window.open(`https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(message)}`,"_blank");
}

// Exibir catálogo
function displayItemsContainer(itemsToShow){
const container=document.getElementById("items-container"); container.innerHTML="";
itemsToShow.forEach(item=>{
const div=document.createElement("div"); div.classList.add("item-card");
div.innerHTML=`<img src="${item.img}" alt="${item.name}">
<h3>${item.name}</h3>
<p>R$${item.realPrice}</p>
<div class="btns"><button onclick="openWhatsApp('${item.name}', ${item.realPrice})">Comprar</button></div>
<span class="favorite-btn">${favorites.includes(item.name)?"❤️":"🤍"}</span>`;
div.querySelector(".favorite-btn").addEventListener("click",()=>{
if(favorites.includes(item.name)){favorites=favorites.filter(i=>i!==item.name);}else{favorites.push(item.name);}
localStorage.setItem("favorites",JSON.stringify(favorites)); updateFavorites();
});
container.appendChild(div);
});
}

// Itens populares (20 iniciais + 20 por scroll)
let popularLoaded=0;
const popularChunk=20;
function displayPopularItems(initial=false){
const container=document.getElementById("popular-items");
let start=popularLoaded;
let end=popularLoaded+popularChunk;
const chunk=items.slice(start,end);
chunk.forEach(item=>{
const div=document.createElement("div"); div.classList.add("item-card");
div.innerHTML=`<img src="${item.img}" alt="${item.name}">
<h3>${item.name}</h3>
<p>R$${item.realPrice}</p>
<div class="btns"><button onclick="openWhatsApp('${item.name}', ${item.realPrice})">Comprar</button></div>`;
container.appendChild(div);
});
popularLoaded=end;
}

// Scroll infinito
window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-100){
displayPopularItems();
}
});

// Editor
const editorGrid=document.getElementById("editor-grid"),totalPriceEl=document.getElementById("total-price"),buyAllBtn=document.getElementById("buy-all");
function displayEditor(){
editorGrid.innerHTML="";
const filtered=currentCategory==="Todos"?items:items.filter(i=>i.category===currentCategory);
filtered.forEach(item=>{
const img=document.createElement("img"); img.src=item.img; img.alt=item.name;
if(selectedItems.includes(item.name)) img.classList.add("selected");
img.addEventListener("click",()=>{
if(selectedItems.includes(item.name)) selectedItems=selectedItems.filter(i=>i!==item.name);
else selectedItems.push(item.name); updateEditor(); displayEditor();
});
editorGrid.appendChild(img);
});
}
function updateEditor(){
const total=items.filter(i=>selectedItems.includes(i.name)).reduce((a,b)=>a+parseFloat(b.realPrice),0);
totalPriceEl.textContent=total.toFixed(2);
buyAllBtn.onclick=()=>{
if(selectedItems.length===0) return alert("Selecione pelo menos 1 item!");
const message=`Olá! Quero comprar: ${selectedItems.join(", ")}. Valor total: R$${total.toFixed(2)}`;
window.open(`https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(message)}`,"_blank");
};
}

// Filtros editor
document.querySelectorAll("#editor-filters button").forEach(btn=>{
btn.addEventListener("click",()=>{
document.querySelectorAll("#editor-filters button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
currentCategory=btn.dataset.category;
displayEditor();
});
});

// Lista de desejos
function updateFavorites(){
displayItemsContainer(items);
displayEditor();
displayPopularItems();
const wishlistContainer=document.getElementById("wishlist-items");
wishlistContainer.innerHTML="";
items.filter(i=>favorites.includes(i.name)).forEach(item=>{
const div=document.createElement("div"); div.classList.add("item-card");
div.innerHTML=`<img src="${item.img}" alt="${item.name}">
<h3>${item.name}</h3>
<p>R$${item.realPrice}</p>
<div class="btns"><button onclick="openWhatsApp('${item.name}', ${item.realPrice})">WhatsApp</button></div>`;
wishlistContainer.appendChild(div);
});
}

// Busca inteligente
const searchInput=document.getElementById("search"),suggestionsDiv=document.getElementById("suggestions");
searchInput.addEventListener("input",e=>{
const term=e.target.value.toLowerCase();
if(term===""){suggestionsDiv.style.display="none"; displayItemsContainer(items); return;}
const filtered=items.filter(i=>i.name.toLowerCase().includes(term));
suggestionsDiv.innerHTML="";
filtered.slice(0,5).forEach(item=>{
const div=document.createElement("div"); div.textContent=item.name;
div.addEventListener("click",()=>{searchInput.value=item.name; displayItemsContainer([item]); suggestionsDiv.style.display="none";});
suggestionsDiv.appendChild(div);
});
suggestionsDiv.style.display=filtered.length>0?"block":"none";
displayItemsContainer(filtered);
});

// Lista / Grade
const body=document.body;
document.getElementById("gridBtn").addEventListener("click",()=>body.classList.remove("list-mode"));
document.getElementById("listBtn").addEventListener("click",()=>body.classList.add("list-mode"));

// Carregar itens (API Habbo ou fallback)
async function loadItems(){
try{
const response=await fetch("https://api.habboapi.net/marketplace");
const data=await response.json();
items=data.map(obj=>({name: obj.item_name, price: obj.lowest_price, realPrice:(obj.lowest_price*CREDITS_TO_REAL).toFixed(2), img: obj.image_url, category: obj.category||"Outros"}));
updateFavorites();
displayEditor();
}catch(err){
console.error("API falhou, usando itens de exemplo",err);
items=[
{name:"Penteado Samurai",price:50,realPrice:(50*CREDITS_TO_REAL).toFixed(2),img:"https://i.imgur.com/Exemplo1.png",category:"Cabelo"},
{name:"Óculos Redondos",price:30,realPrice:(30*CREDITS_TO_REAL).toFixed(2),img:"https://i.imgur.com/Exemplo2.png",category:"Óculos"},
{name:"Camisa Azul",price:40,realPrice:(40*CREDITS_TO_REAL).toFixed(2),img:"https://i.imgur.com/Exemplo3.png",category:"Camisas"},
{name:"Sapato Vermelho",price:25,realPrice:(25*CREDITS_TO_REAL).toFixed(2),img:"https://i.imgur.com/Exemplo4.png",category:"Sapatos"},
{name:"Chapéu Cowboy",price:60,realPrice:(60*CREDITS_TO_REAL).toFixed(2),img:"https://i.imgur.com/Exemplo5.png",category:"Chapéu"}
];
updateFavorites();
displayEditor();
}
}

window.addEventListener("load",loadItems);
</script>

</body>
</html>
